<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <script>
    // GitHub Pages SPA redirect trick
    // When GH Pages 404s on /portfolio, /about, etc., it serves this file.
    // We encode the path into the query string so index.html can restore it.
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      '/?/' + l.pathname.slice(1) +
      (l.search ? '&' + l.search.slice(1) : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
